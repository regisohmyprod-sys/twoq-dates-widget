<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The World of Queen - Dates de tournée</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #c9a84c;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .header p {
      font-size: 16px;
      color: #888;
      letter-spacing: 1px;
    }

    .dates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .date-card {
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .date-card:hover {
      border-color: #c9a84c;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.2);
    }

    .date-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #c9a84c 0%, #8b7332 100%);
    }

    .date-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }

    .date-box {
      background: rgba(201, 168, 76, 0.1);
      border: 2px solid #c9a84c;
      border-radius: 8px;
      padding: 12px;
      min-width: 70px;
      text-align: center;
    }

    .date-month {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #c9a84c;
      text-transform: uppercase;
    }

    .date-day {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      margin: 4px 0;
    }

    .date-year {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      letter-spacing: 1px;
    }

    .date-weekday {
      font-size: 9px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .date-info {
      flex: 1;
    }

    .ville {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .salle {
      font-size: 14px;
      color: #888;
      margin-bottom: 4px;
    }

    .heure {
      font-size: 13px;
      color: #c9a84c;
      font-weight: 600;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge.residence {
      background: rgba(201, 168, 76, 0.2);
      color: #c9a84c;
      border: 1px solid #c9a84c;
    }

    .badge.nouveau {
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      border: 1px solid #a78bfa;
    }

    .ticket-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .ticket-btn {
      flex: 1;
      min-width: 140px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      transition: all 0.3s ease;
      border: 2px solid;
    }

    .ticket-btn.primary {
      background: #c9a84c;
      color: #000;
      border-color: #c9a84c;
    }

    .ticket-btn.primary:hover {
      background: #d4b86e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.4);
    }

    .ticket-btn.secondary {
      background: transparent;
      color: #888;
      border-color: #333;
    }

    .ticket-btn.secondary:hover {
      border-color: #666;
      color: #aaa;
    }

    .ticket-btn.no-tickets {
      background: transparent;
      color: #666;
      border-color: #2a2a2a;
      cursor: not-allowed;
      pointer-events: none;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a2a2a;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 20px;
      color: #ef4444;
      text-align: center;
    }

    @media (max-width: 768px) {
      .dates-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 32px;
      }

      .ticket-buttons {
        flex-direction: column;
      }

      .ticket-btn {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 Dates de Tournée</h1>
      <p>The World of Queen - L'Éternelle Légende</p>
    </div>

    <div id="dates-container">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Chargement des dates...</p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nhxqcavianozskxgfcbt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeHFjYXZpYW5venNreGdmY2J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyOTE0NjMsImV4cCI6MjA5MDg2NzQ2M30.sul93O7NFiIni3VnTkSld9HM6J73dnAYrnOT8PqFFW4';

    const MOIS_FR = ['JAN', 'FÉV', 'MAR', 'AVR', 'MAI', 'JUN', 'JUL', 'AOÛ', 'SEP', 'OCT', 'NOV', 'DÉC'];
    const JOURS_FR = ['DIM', 'LUN', 'MAR', 'MER', 'JEU', 'VEN', 'SAM'];

    async function chargerDates() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/dates_concert?tournee_id=eq.22222222-2222-2222-2222-222222222222&publier_site=eq.true&order=date_concert.asc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (!response.ok) throw new Error('Erreur chargement dates');

        const dates = await response.json();
        afficherDates(dates);
      } catch (error) {
        console.error('Erreur:', error);
        document.getElementById('dates-container').innerHTML = `
          <div class="error">
            <p>⚠️ Impossible de charger les dates</p>
            <p style="font-size:12px;margin-top:8px;">${error.message}</p>
          </div>
        `;
      }
    }

    function afficherDates(dates) {
      if (!dates || dates.length === 0) {
        document.getElementById('dates-container').innerHTML = `
          <div class="loading">
            <p>📭 Aucune date publiée pour le moment</p>
          </div>
        `;
        return;
      }

      const html = `
        <div class="dates-grid">
          ${dates.map(date => creerCarteDate(date)).join('')}
        </div>
      `;

      document.getElementById('dates-container').innerHTML = html;
    }

    function creerCarteDate(date) {
      const d = new Date(date.date_concert + 'T12:00:00');
      const jour = d.getDate();
      const mois = MOIS_FR[d.getMonth()];
      const annee = d.getFullYear();
      const jourSemaine = JOURS_FR[d.getDay()];

      // Parser les liens billetterie
      let liens = {};
      try {
        liens = date.liens_billetterie || {};
      } catch (e) {
        console.error('Erreur parsing liens:', e);
      }

      const lienPrincipal = date.lien_billetterie_principal;
      const hasTickets = !!(lienPrincipal || liens.ticketmaster || liens.fnac || liens.salle || liens.pmr);

      // CORRECTION CRITIQUE : Si pas de liens DU TOUT, afficher NO TICKETS
      // Avant : certaines dates sans lien disparaissaient
      // Après : toutes les dates sans lien affichent "NO TICKETS"
      
      let badgesHtml = '';
      if (date.statut_public === 'residence' || !hasTickets) {
        badgesHtml = '<span class="badge residence">★ RÉSIDENCE NOUVEAU SHOW ★</span>';
      }
      if (date.statut_public === 'nouveau') {
        badgesHtml += '<span class="badge nouveau">★ NOUVEAU SPECTACLE ★</span>';
      }

      let boutonsHtml = '';
      
      if (hasTickets) {
        // Si au moins un lien existe, afficher les boutons
        const lienPrimaire = lienPrincipal || liens.ticketmaster || liens.fnac || liens.salle;
        
        boutonsHtml = `<a href="${lienPrimaire}" target="_blank" class="ticket-btn primary">🎟️ Réserver</a>`;
        
        if (liens.fnac && liens.fnac !== lienPrimaire) {
          boutonsHtml += `<a href="${liens.fnac}" target="_blank" class="ticket-btn secondary">Fnac</a>`;
        }
        if (liens.salle && liens.salle !== lienPrimaire) {
          boutonsHtml += `<a href="${liens.salle}" target="_blank" class="ticket-btn secondary">Salle</a>`;
        }
        if (liens.pmr) {
          boutonsHtml += `<a href="${liens.pmr}" target="_blank" class="ticket-btn secondary">PMR</a>`;
        }
      } else {
        // CORRECTION : Afficher NO TICKETS pour TOUTES les dates sans lien
        boutonsHtml = `<div class="ticket-btn no-tickets">NO TICKETS</div>`;
      }

      return `
        <div class="date-card">
          <div class="date-header">
            <div class="date-box">
              <div class="date-month">${mois}</div>
              <div class="date-day">${jour}</div>
              <div class="date-year">${annee}</div>
              <div class="date-weekday">${jourSemaine}</div>
            </div>
            <div class="date-info">
              <div class="ville">${date.ville || 'Ville'}</div>
              <div class="salle">${date.nom_salle || 'Salle'}</div>
              ${date.heure_show ? `<div class="heure">${date.heure_show.substring(0, 5)}</div>` : ''}
            </div>
          </div>
          ${badgesHtml ? `<div class="badges">${badgesHtml}</div>` : ''}
          <div class="ticket-buttons">
            ${boutonsHtml}
          </div>
        </div>
      `;
    }

    // Charger les dates au chargement de la page
    document.addEventListener('DOMContentLoaded', chargerDates);
  </script>
</body>
</html>
